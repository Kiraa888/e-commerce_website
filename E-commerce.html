<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce | Premium Dark Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --accent-red: #ff2a2a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --rating-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Header & Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent-red);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-red);
        }

        .cart-icon {
            font-size: 24px;
            cursor: pointer;
            position: relative;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -10px;
            background: var(--accent-red);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-red);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg-dark) 80%);
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .hero h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 20px rgba(255, 42, 42, 0.5);
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn-glow {
            background: transparent;
            color: var(--accent-red);
            border: 2px solid var(--accent-red);
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn-glow.success {
            background: #28a745;
            border-color: #28a745;
            color: white;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.4);
        }

        .btn-glow:hover:not(.success) {
            background: var(--accent-red);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-red);
        }

        /* Products Section & Filters */
        .products-section {
            padding: 100px 50px;
            text-align: center;
        }

        .products-section h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .products-section h2 span {
            color: var(--accent-red);
        }

        /* 🚀 UPGRADE 3: Search Bar */
        .search-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        #search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #search-input:focus {
            border-color: var(--accent-red);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--glass-bg);
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 42, 42, 0.15);
            border-color: rgba(255, 42, 42, 0.3);
        }

        .product-img-wrapper {
            width: 100%;
            cursor: pointer;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: opacity 0.3s;
        }

        .product-card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        /* 🚀 UPGRADE 2: Rating Styles */
        .rating {
            color: var(--rating-gold);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .rating span {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .product-card .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-red);
            margin-bottom: 15px;
        }

        /* Product Detail Modal */
        .product-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        .product-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .product-modal img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .product-modal p {
            color: var(--text-muted);
            margin: 15px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--glass-border);
            z-index: 200;
            padding: 20px;
            transition: right 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 28px;
            cursor: pointer;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 0.9rem; margin-bottom: 5px; }
        .cart-item-info p { color: var(--accent-red); font-weight: bold; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .qty-btn {
            background: var(--glass-border);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .qty-btn:hover { background: var(--accent-red); }

        .remove-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
        }

        .remove-btn:hover { color: var(--accent-red); }

        .empty-cart-msg {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
            font-style: italic;
        }

        .cart-footer {
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
            text-align: center;
        }

        /* 🚀 UPGRADE 1: Clear Cart Link */
        .clear-cart-link {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: underline;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
            transition: color 0.2s;
        }
        
        .clear-cart-link:hover { color: var(--accent-red); }

        .cart-total {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--text-muted);
            color: var(--text-muted);
        }
        
        .checkout-btn:disabled:hover {
            background: transparent;
            box-shadow: none;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            display: none;
        }

        .overlay.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            header { padding: 15px 20px; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LUX<span>ORA</span></div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
            </ul>
        </nav>
        <div class="cart-icon" id="cart-icon">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Elevate Your <span>Style</span></h1>
            <p>Discover our exclusive collection of premium gear.</p>
            <a href="#shop" class="btn-glow" style="width: auto;">Shop Now</a>
        </div>
    </section>

    <section id="shop" class="products-section">
        <h2>Featured <span>Products</span></h2>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for gear...">
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" onclick="setCategory('All', this)">All</button>
            <button class="filter-btn" onclick="setCategory('Peripherals', this)">Peripherals</button>
            <button class="filter-btn" onclick="setCategory('Audio', this)">Audio</button>
            <button class="filter-btn" onclick="setCategory('Wearables', this)">Wearables</button>
        </div>

        <div class="product-grid" id="product-grid">
            </div>
    </section>

    <div class="product-modal" id="product-modal">
        <button class="close-btn modal-close" onclick="closeProductModal()">&times;</button>
        <img id="modal-img" src="" alt="Product Image" loading="lazy">
        <h2 id="modal-title">Product Name</h2>
        <div class="rating" id="modal-rating"></div>
        <p id="modal-desc">Product description goes here.</p>
        <div class="price" id="modal-price">₹0.00</div>
        <button class="btn-glow" id="modal-add-btn">Add to Cart</button>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            </div>
        <div class="cart-footer">
            <span class="clear-cart-link" id="clear-cart-btn" onclick="clearCart()">Clear Cart</span>
            <div class="cart-total">Total: ₹<span id="total-price">0.00</span></div>
            <button class="btn-glow checkout-btn" id="checkout-btn">Checkout</button>
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>

    <script>
        // 🚀 UPGRADE 2: Added rating & review counts
        const products = [
            { id: 1, name: "Obsidian Mechanical Keyboard", price: 12499, category: "Peripherals", rating: 4.8, reviews: 142, description: "Aircraft-grade aluminum frame with tactile, ultra-responsive switches for the ultimate typing and gaming experience.", img: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=500&q=80" },
            { id: 2, name: "Crimson Noise-Cancelling Headphones", price: 24999, category: "Audio", rating: 4.9, reviews: 320, description: "Immerse yourself in studio-quality sound. Features active noise cancellation and 40 hours of battery life.", img: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=500&q=80" },
            { id: 3, name: "Stealth Gaming Mouse", price: 7499, category: "Peripherals", rating: 4.5, reviews: 89, description: "Ultra-lightweight design with a 20,000 DPI optical sensor. Precision engineered for esports professionals.", img: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=500&q=80" },
            { id: 4, name: "Luxury Smartwatch", price: 16999, category: "Wearables", rating: 4.7, reviews: 215, description: "Track your fitness, heart rate, and notifications in premium style with a sapphire glass display.", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80" }
        ];

        let cart = JSON.parse(localStorage.getItem("luxora-cart")) || [];
        let currentCategory = 'All';
        let searchQuery = '';

        const productGrid = document.getElementById('product-grid');
        const searchInput = document.getElementById('search-input');
        const cartIcon = document.getElementById('cart-icon');
        const cartSidebar = document.getElementById('cart-sidebar');
        const closeCart = document.getElementById('close-cart');
        const overlay = document.getElementById('overlay');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const totalPriceEl = document.getElementById('total-price');
        const checkoutBtn = document.getElementById('checkout-btn');
        const clearCartBtn = document.getElementById('clear-cart-btn');
        const productModal = document.getElementById('product-modal');

        // Generate stars based on rating
        function getStars(rating) {
            let stars = '';
            for(let i=1; i<=5; i++) {
                stars += i <= Math.round(rating) ? '★' : '☆';
            }
            return stars;
        }

        // 🚀 Engine handling BOTH filters and search
        function renderProducts() {
            productGrid.innerHTML = '';
            
            const filteredProducts = products.filter(p => {
                const matchesCategory = currentCategory === 'All' || p.category === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if(filteredProducts.length === 0) {
                productGrid.innerHTML = `<p style="grid-column: 1/-1; color: var(--text-muted);">No products found matching "${searchQuery}".</p>`;
                return;
            }
            
            filteredProducts.forEach((product, index) => {
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="product-img-wrapper" onclick="openProductModal(${product.id})">
                        <img src="${product.img}" alt="${product.name}" loading="lazy">
                        <h3>${product.name}</h3>
                        <div class="rating">${getStars(product.rating)} <span>(${product.reviews})</span></div>
                        <div class="price">₹${product.price.toLocaleString('en-IN')}</div>
                    </div>
                    <button class="btn-glow" onclick="addToCart(${product.id}, this)">Add to Cart</button>
                `;
                productGrid.appendChild(card);
            });
        }

        function setCategory(category, btnElement) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderProducts();
        }

        // Real-time search listener
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        function openProductModal(id) {
            const product = products.find(p => p.id === id);
            document.getElementById('modal-img').src = product.img;
            document.getElementById('modal-title').innerText = product.name;
            document.getElementById('modal-rating').innerHTML = `${getStars(product.rating)} <span>(${product.reviews} Reviews)</span>`;
            document.getElementById('modal-desc').innerText = product.description;
            document.getElementById('modal-price').innerText = `₹${product.price.toLocaleString('en-IN')}`;
            
            const addBtn = document.getElementById('modal-add-btn');
            // Reset button text just in case it was stuck on 'Added'
            addBtn.innerText = "Add to Cart"; 
            addBtn.className = "btn-glow";

            addBtn.onclick = function() {
                addToCart(product.id, this);
            };

            productModal.classList.add('active');
            overlay.classList.add('active');
        }

        function closeProductModal() {
            productModal.classList.remove('active');
            if (!cartSidebar.classList.contains('active')) {
                overlay.classList.remove('active');
            }
        }

        function saveCart() {
            localStorage.setItem("luxora-cart", JSON.stringify(cart));
        }

        // 🚀 UPGRADE 4: Micro Feedback on the specific button clicked
        function addToCart(id, btnElement) {
            const product = products.find(p => p.id === id);
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
            
            // Visual Button Feedback
            const originalText = btnElement.innerText;
            btnElement.innerText = "Added ✓";
            btnElement.classList.add('success');
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.remove('success');
            }, 1500);

            // Optional: Automatically open cart or keep it subtle (Let's just update the badge for subtle UX, but user requested cart opens in previous step. We'll leave the badge update which is automatic, and NOT force open the cart to let the micro-interaction shine).
        }

        function changeQty(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                    return; 
                }
                updateCartUI();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        // 🚀 UPGRADE 1: Clear Entire Cart
        function clearCart() {
            if(confirm("Are you sure you want to empty your cart?")) {
                cart = [];
                updateCartUI();
            }
        }

        function updateCartUI() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<div class="empty-cart-msg">Your cart is currently empty.</div>`;
                checkoutBtn.disabled = true;
                clearCartBtn.style.display = 'none';
            } else {
                checkoutBtn.disabled = false;
                clearCartBtn.style.display = 'inline-block';
                
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    count += item.quantity;

                    const cartItem = document.createElement('div');
                    cartItem.classList.add('cart-item');
                    cartItem.innerHTML = `
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>₹${item.price.toLocaleString('en-IN')}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">&times;</button>
                    `;
                    cartItemsContainer.appendChild(cartItem);
                });
            }

            cartCount.innerText = count;
            totalPriceEl.innerText = total.toLocaleString('en-IN');
            
            // Add a little pop animation to the cart badge
            cartCount.style.transform = 'scale(1.5)';
            setTimeout(() => cartCount.style.transform = 'scale(1)', 200);

            saveCart();
        }

        function openCart() {
            closeProductModal(); 
            cartSidebar.classList.add('active');
            overlay.classList.add('active');
        }

        function closeCartSidebar() {
            cartSidebar.classList.remove('active');
            if (!productModal.classList.contains('active')) {
                overlay.classList.remove('active');
            }
        }

        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) return;
            alert(`Demo Checkout Initiated!\nTotal: ₹${totalPriceEl.innerText}\nBackend integration pending.`);
            cart = []; 
            updateCartUI();
            closeCartSidebar();
        });

        cartIcon.addEventListener('click', openCart);
        closeCart.addEventListener('click', closeCartSidebar);
        overlay.addEventListener('click', () => {
            closeCartSidebar();
            closeProductModal();
        });

        // Initialize App
        renderProducts(); 
        updateCartUI(); 
    </script>
</body>
</html>
